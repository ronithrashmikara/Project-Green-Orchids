name: CI

on:
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: project_green
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check the API
        run: npm run build:api

      - name: Build the web app
        run: npm run build:web
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Run the API integration test suite
        run: npm test
        env:
          # The test runner derives a disposable "_test" database from this URL.
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/project_green
          JWT_ACCESS_SECRET: ci-test-access-secret-not-a-real-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret-not-a-real-secret
          NODE_ENV: test
