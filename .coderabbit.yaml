# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
early_access: false

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  in_progress_fortune: false
  poem: false
  review_status: true
  path_filters:
    - "apps/web/**"
  path_instructions:
    - path: "apps/web/app/**"
      instructions: |
        Audit routing, server/client boundaries, authorization assumptions, data
        fetching, error/loading states, accessibility, responsive behavior,
        privacy, performance, and failure handling. Report concrete issues only.
    - path: "apps/web/src/**"
      instructions: |
        Check API-client safety, authentication and RBAC helpers, state management,
        cookie consent, component accessibility, stale-state races, unsafe rendering,
        and missing tests. Include exact file and line evidence for each finding.
  auto_review:
    enabled: true
    drafts: true
    auto_incremental_review: true

chat:
  art: false
